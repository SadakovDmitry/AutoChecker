datasets:
  kasko_izmenenie:
    files:
      - "КАСКО - Изменение договора.xlsx"
      - "kasko_izmenenie_auto_train.csv"
      - "kasko_izmenenie_auto_val.csv"
    iterations:
      "Sheet0":
        reasons:
          "1": {key: drivers_list_change, name: "Изменение списка водителей"}
          "2": {key: vehicle_registration_data_change, name: "Изменение регистрационных данных"}
          "3": {key: beneficiary_change, name: "Изменение выгодоприобретателя"}
          "4": {key: limit_or_start_mileage_change, name: "Корректировка лимита или стартового пробега"}
          "5": {key: unpaid_draft_policy_change_delete, name: "Внесение изменений или удаление неоплаченного проекта"}
