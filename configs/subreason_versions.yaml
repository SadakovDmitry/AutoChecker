          "2": {key: service_selection_change, name: "Проблемы с выбором или заменой автосервиса"}
          "3": {key: claim_registration_app, name: "Регистрация страхового случая в приложении"}
          "4": {key: terms_franchise, name: "Вопросы по условиям страхования и франшизе"}
          "5": {key: stone_glass_damage, name: "Повреждение стекла от камня"}
          "6": {key: repair_quality_service, name: "Жалобы на качество ремонта и выбор СТО"}

