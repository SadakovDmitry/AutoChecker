          "5": {key: terms_franchise, name: "Вопросы по условиям страхования и франшизе"}
          "6": {key: stone_glass_damage, name: "Повреждение стекла от камня"}
          "7": {key: unclear_status_and_communication, name: "Неясный статус страхового случая и сложности с коммуникацией", merged_from: [unclear_status]}
