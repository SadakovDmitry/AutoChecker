          "5": {key: car_sale_policy_cancellation, name: "Продажа автомобиля и расторжение полиса"}
          "6": {key: policy_errors_and_terms, name: "Ошибки в оформлении и условиях полиса"}
          "7": {key: preinsurance_inspection_problem, name: "Проблемы с предстраховым осмотром"}
          "8": {key: unpaid_draft_policy_delete, name: "Удаление неоплаченного проекта полиса"}
          "9": {key: refund_terms_and_processing, name: "Запросы о возврате средств и сроках обработки"}
