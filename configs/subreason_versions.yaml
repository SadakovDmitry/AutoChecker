          "4": {key: car_sale_policy_cancellation, name: "Продажа автомобиля и расторжение полиса"}
          "5": {key: policy_errors_and_terms, name: "Ошибки в оформлении и условиях полиса"}
          "6": {key: preinsurance_inspection_problem, name: "Проблемы с предстраховым осмотром"}
          "7": {key: unpaid_draft_policy_delete, name: "Удаление неоплаченного проекта полиса"}
          "8": {key: refund_terms_and_processing, name: "Запросы о возврате средств и сроках обработки"}
          "9": {key: casco_drive_autorenewal_disable, name: "Отключение автопродления КАСКО Драйв"}

